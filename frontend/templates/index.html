<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMO.SOUL - 情绪燃料实验室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;700&family=Space+Grotesk:wght@300;500&display=swap');
        
        body {
            font-family: 'Space Grotesk', 'Noto Serif SC', serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }

        .video-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: -2;
            opacity: 0.3;
            transition: opacity 2s ease;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent, rgba(0,0,0,0.9));
            z-index: -1;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-bubble {
            max-width: 85%;
            padding: 1rem 1.5rem;
            border-radius: 24px;
            margin-bottom: 1.2rem;
            animation: fadeIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #weather-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .progress-container {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            z-index: 50;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(to right, #fff, #3b82f6);
            border-radius: 10px;
            width: 0%;
            transition: width 0.5s ease;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        .energy-bolt {
            position: fixed;
            top: 50%;
            left: 50%;
            pointer-events: none;
            z-index: 100;
            filter: drop-shadow(0 0 10px #3b82f6);
        }

        .map-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        /* Weather Select */
        .weather-btn {
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .weather-btn.active {
            background: white;
            color: black;
        }
    </style>
</head>
<body class="min-h-screen">
    <canvas id="weather-canvas"></canvas>
    <video id="bg-video" class="video-bg" autoplay muted loop playsinline src="https://assets.mixkit.co/videos/preview/mixkit-stars-in-the-night-sky-slow-motion-2682-large.mp4"></video>
    <div class="overlay"></div>

    <!-- Nav -->
    <nav class="fixed top-0 w-full p-6 flex justify-between items-center z-50 glass border-b border-white/5">
        <div class="flex items-center gap-3">
            <i data-lucide="zap" class="w-6 h-6 text-blue-400 fill-blue-400"></i>
            <span class="text-lg font-bold tracking-tighter uppercase">EMO.LAB</span>
        </div>
        
        <div class="flex gap-2">
            <a href="/vault" class="weather-btn glass hover:bg-white hover:text-black flex items-center gap-2">
                <i data-lucide="database" class="w-3 h-3"></i>
                情绪燃料库
            </a>
            <select id="genre-select" class="weather-btn glass appearance-none cursor-pointer">
                <option value="ambient">曲风: Ambient</option>
                <option value="lo-fi">曲风: Lo-Fi</option>
                <option value="cinematic">曲风: Cinematic</option>
            </select>
            <button onclick="setWeather('clear')" id="btn-clear" class="weather-btn glass active">晴朗</button>
            <button onclick="setWeather('rain')" id="btn-rain" class="weather-btn glass">阴雨</button>
            <button onclick="setWeather('snow')" id="btn-snow" class="weather-btn glass">飘雪</button>
        </div>

        <div class="flex items-center gap-6">
            <div id="energy-counter" class="text-sm font-mono text-blue-400 flex items-center gap-2">
                <i data-lucide="battery-charging" class="w-4 h-4"></i>
                <span id="energy-val">0</span> kW
            </div>
            <button onclick="toggleMute()" class="opacity-50 hover:opacity-100 transition-opacity">
                <i id="mute-icon" data-lucide="volume-2" class="w-5 h-5"></i>
            </button>
        </div>
    </nav>

    <!-- Progress Indicator -->
    <div class="progress-container">
        <div class="progress-bar" id="main-progress"></div>
        <div class="text-[10px] text-center mt-2 opacity-40 uppercase tracking-widest">和弦构造进度: <span id="round-text">0</span>/10</div>
    </div>

    <!-- Global Map UI -->
    <div class="fixed left-6 top-24 glass p-6 rounded-3xl w-56 z-30">
        <h3 class="text-[10px] uppercase tracking-widest text-white/40 mb-4">全球情绪分布</h3>
        <div id="sentiment-map" class="space-y-4">
            <!-- Map items -->
        </div>
    </div>

    <!-- Main Content -->
    <main class="h-screen flex flex-col justify-end px-6 pb-24 max-w-4xl mx-auto relative z-20">
        <div id="chat-history" class="overflow-y-auto mb-8 pr-4 flex flex-col scroll-smooth h-[60vh]">
            <div class="chat-bubble glass self-start text-white/80">
                [系统初始化完毕] 欢迎进入情绪燃料实验室。我们将通过 10 轮深度觉察对话，将你的情绪波长转化为复合和弦音轨与数字能源。
            </div>
        </div>

        <!-- Typing Indicator -->
        <div id="typing-indicator" class="hidden chat-bubble glass self-start text-white/40 italic text-xs mb-4">
            AI 正在共情中...
        </div>

        <div class="relative group">
            <textarea id="user-input" 
                class="w-full bg-white/5 border border-white/10 rounded-2xl p-6 pr-24 text-lg focus:ring-1 focus:ring-white/20 focus:outline-none placeholder-white/20 resize-none transition-all glass"
                placeholder="分享你此刻的心境..." rows="2"></textarea>
            
            <button id="send-btn" class="absolute right-4 bottom-4 w-12 h-12 bg-white text-black rounded-full flex items-center justify-center hover:scale-105 transition-transform active:scale-95 shadow-xl disabled:opacity-30">
                <i data-lucide="arrow-right" class="w-5 h-5"></i>
            </button>
        </div>
    </main>

    <!-- Final Token Card -->
    <div id="final-card" class="fixed inset-0 flex items-center justify-center bg-black/80 z-[200] hidden">
        <div id="mint-initial-view" class="glass p-12 rounded-[40px] text-center max-w-md space-y-8 scale-90 animate-in fade-in zoom-in duration-500">
            <div class="w-24 h-24 bg-blue-500/20 rounded-full mx-auto flex items-center justify-center text-blue-400">
                <i data-lucide="zap" class="w-12 h-12 fill-current"></i>
            </div>
            <div>
                <h2 class="text-3xl font-bold mb-2">情绪曲谱已生成</h2>
                <p class="text-white/40 text-sm">已累积 10 组复合和弦，总计转化能量:</p>
                <div class="text-5xl font-bold text-blue-400 mt-4" id="final-energy">0 kW</div>
            </div>
            <button id="mint-btn" class="w-full py-4 bg-white text-black rounded-2xl font-bold hover:scale-105 transition-transform">
                铸造情绪 Token (能源燃料)
            </button>
            <button onclick="location.reload()" class="text-xs text-white/20 hover:text-white transition-colors uppercase tracking-widest">
                重新开启实验
            </button>
        </div>

        <!-- Pre-sale / Fake Door View -->
        <div id="mint-presale-view" class="hidden glass p-12 rounded-[40px] text-center max-w-md space-y-8">
            <div class="w-24 h-24 bg-green-500/20 rounded-full mx-auto flex items-center justify-center text-green-400">
                <i data-lucide="rocket" class="w-12 h-12"></i>
            </div>
            <div>
                <h2 class="text-3xl font-bold mb-2">锁定创世资格</h2>
                <p class="text-white/40 text-sm">Token 铸造功能即将上线。现在预付 <span class="text-white font-bold">1 元</span> 即可锁定首批创世资格，并享受永久 5 折铸造费用。</p>
            </div>
            <button id="presale-btn" class="w-full py-4 bg-green-500 text-black rounded-2xl font-bold hover:scale-105 transition-transform">
                立即预定 (¥1.00)
            </button>
            <button id="cancel-presale-btn" class="text-xs text-white/20 hover:text-white transition-colors uppercase tracking-widest">
                稍后再说
            </button>
        </div>

        <!-- Thank You View -->
        <div id="mint-thanks-view" class="hidden glass p-12 rounded-[40px] text-center max-w-md space-y-8">
            <div class="w-24 h-24 bg-purple-500/20 rounded-full mx-auto flex items-center justify-center text-purple-400">
                <i data-lucide="party-popper" class="w-12 h-12"></i>
            </div>
            <div>
                <h2 class="text-3xl font-bold mb-2">感谢您的支持！</h2>
                <p class="text-white/40 text-sm">您已成功锁定创世资格！我们将在功能上线后第一时间通过系统通知您。</p>
            </div>
            <button onclick="location.reload()" class="w-full py-4 bg-purple-500 text-black rounded-2xl font-bold hover:scale-105 transition-transform">
                开启新的实验
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // State
        let currentRound = 0;
        let totalEnergy = 0;
        let currentChords = [];
        let fullHistory = []; // Objects: {user: "", ai: ""}
        let lastAIResponse = "";
        let weatherType = 'clear';
        let synth, pad, reverb;
        let isMuted = false;
        let currentMelodyParams = null;

        // Audio Setup
        async function setupAudio(genre) {
            if (synth) {
                // Update synth based on genre if already exists
                const synthType = genre === 'lo-fi' ? 'triangle' : (genre === 'cinematic' ? 'sawtooth' : 'sine');
                pad.set({ oscillator: { type: synthType } });
                return;
            };
            
            await Tone.start();
            reverb = new Tone.Reverb({ decay: 6, wet: 0.6 }).toDestination();
            
            const synthType = genre === 'lo-fi' ? 'triangle' : (genre === 'cinematic' ? 'sawtooth' : 'sine');
            
            pad = new Tone.PolySynth(Tone.Synth, {
                oscillator: { type: synthType },
                envelope: { attack: 3, decay: 1, sustain: 1, release: 5 }
            }).connect(reverb);
            pad.volume.value = -25;
            
            synth = new Tone.MonoSynth({
                oscillator: { type: 'sine' },
                envelope: { attack: 0.5, release: 2 }
            }).connect(reverb);
            synth.volume.value = -20;
        }

        // Send Logic
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const history = document.getElementById('chat-history');
        const typing = document.getElementById('typing-indicator');

        sendBtn.addEventListener('click', async () => {
            const text = input.value.trim();
            const genre = document.getElementById('genre-select').value;
            if (!text || currentRound >= 10) return;

            currentRound++;
            // Temporary entry, will be updated with AI response
            fullHistory.push({user: text, ai: ""});
            updateProgress();
            addMessage(text, 'self-end glass text-white');
            input.value = '';
            sendBtn.disabled = true;
            
            // Show typing indicator
            typing.classList.remove('hidden');
            history.scrollTop = history.scrollHeight;

            try {
                // Prepare history for LLM
                const historyForAPI = fullHistory.map(h => ({user: h.user, ai: h.ai}));
                
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        text, 
                        round: currentRound, 
                        genre: genre,
                        history: historyForAPI
                    })
                });
                const data = await res.json();
                
                // Delay AI response for "thinking" feel
                setTimeout(() => {
                    typing.classList.add('hidden');
                    handleAIResponse(data);
                    applyModeVisuals(data.music_params.mode);
                }, 1200);
                
                updateGlobalMap(data.regional_data);
            } catch (e) {
                console.error(e);
                typing.classList.add('hidden');
            } finally {
                if (currentRound < 10) sendBtn.disabled = false;
            }
        });

        function applyModeVisuals(mode) {
            const overlay = document.querySelector('.overlay');
            const colors = {
                intense: 'rgba(255, 0, 0, 0.2)',
                nostalgic: 'rgba(100, 100, 255, 0.2)',
                bright: 'rgba(255, 255, 100, 0.1)',
                peaceful: 'rgba(0, 0, 0, 0.9)'
            };
            overlay.style.background = `radial-gradient(circle at center, transparent, ${colors[mode] || colors.peaceful})`;
            
            // Flash effect for intense
            if (mode === 'intense') {
                const flash = document.createElement('div');
                flash.className = 'fixed inset-0 bg-white/10 z-[100] pointer-events-none';
                document.body.appendChild(flash);
                setTimeout(() => flash.remove(), 100);
            }
        }

        function updateProgress() {
            const bar = document.getElementById('main-progress');
            bar.style.width = `${currentRound * 10}%`;
            document.getElementById('round-text').innerText = currentRound;
        }

        function addMessage(text, classes) {
            const msg = document.createElement('div');
            msg.className = `chat-bubble ${classes}`;
            msg.innerText = text;
            history.appendChild(msg);
            history.scrollTop = history.scrollHeight;
        }

        async function handleAIResponse(data) {
            // Update history with AI response
            if (fullHistory.length > 0) {
                fullHistory[fullHistory.length - 1].ai = data.ai_response;
            }

            // Energy animation
            const gain = Math.round(data.music_params.energy_gain);
            totalEnergy += gain;
            document.getElementById('energy-val').innerText = totalEnergy;
            spawnEnergyEffect();

            // Music
            await setupAudio(data.music_params.genre);
            currentChords.push(data.music_params.new_chord);
            currentMelodyParams = data.music_params.melody; // Update melody params
            playEvolvingMusic(data.music_params);

            // AI Text
            lastAIResponse = data.ai_response;
            setTimeout(() => {
                addMessage(data.ai_response, 'self-start glass text-blue-200 border-l-2 border-blue-500/50');
                if (currentRound >= 10) showFinalCard();
            }, 800);
        }

        function playEvolvingMusic(params) {
            Tone.Transport.stop();
            Tone.Transport.cancel();
            Tone.Transport.bpm.value = params.tempo;

            let chordIdx = 0;
            const loop = new Tone.Loop(time => {
                // Play chords (1 bar each)
                const chord = currentChords[chordIdx % currentChords.length];
                pad.triggerAttackRelease(chord, '1n', time);
                chordIdx++;
            }, '1n').start(0);

            // Lead Melody Loop (P2 Upgrade)
            const melodyLoop = new Tone.Loop(time => {
                if (!currentMelodyParams) return;
                
                // Probability of playing a note based on rhythm density
                if (Math.random() < currentMelodyParams.rhythm_density) {
                    const chord = currentChords[currentChords.length - 1]; // Current mood's chord
                    const m = currentMelodyParams;
                    
                    // Select a note from the chord and apply pitch offset
                    let note = chord[Math.floor(Math.random() * chord.length)];
                    
                    // Random expressivity factor
                    const velocity = 0.5 + (Math.random() * m.expressivity * 0.5);
                    
                    synth.triggerAttackRelease(note, m.note_length, time, velocity);
                }
            }, '8n').start(0);

            Tone.Transport.start();
        }

        function showFinalCard() {
            const card = document.getElementById('final-card');
            card.classList.remove('hidden');
            document.getElementById('final-energy').innerText = `${totalEnergy} kW`;
        }

        async function saveSession() {
            const genre = document.getElementById('genre-select').value;
            const payload = {
                text: fullHistory[fullHistory.length - 1].user,
                full_history: fullHistory.map(h => h.user),
                total_energy: totalEnergy,
                summary: lastAIResponse,
                music_params: {
                    chords: currentChords,
                    genre: genre,
                    tempo: Tone.Transport.bpm.value
                }
            };
            
            try {
                const res = await fetch('/api/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                return await res.json();
            } catch (e) {
                console.error("Save failed:", e);
                return null;
            }
        }

        // Global Map
        function updateGlobalMap(data) {
            const map = document.getElementById('sentiment-map');
            map.innerHTML = Object.entries(data).map(([region, vals]) => `
                <div class="space-y-1">
                    <div class="flex justify-between text-[10px]">
                        <span class="text-white/60">${region}</span>
                        <span class="text-blue-400">${Math.round(vals.energy * 100)}% 负荷</span>
                    </div>
                    <div class="h-1 w-full bg-white/5 rounded-full overflow-hidden">
                        <div class="h-full bg-blue-500" style="width: ${vals.happiness * 100}%"></div>
                    </div>
                </div>
            `).join('');
        }

        // Weather System
        function setWeather(type) {
            weatherType = type;
            document.querySelectorAll('.weather-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${type}`).classList.add('active');
        }

        const canvas = document.getElementById('weather-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = -20;
                this.size = weatherType === 'snow' ? Math.random() * 3 + 1 : Math.random() * 1 + 1;
                this.speed = weatherType === 'snow' ? Math.random() * 1 + 0.5 : Math.random() * 5 + 10;
                this.opacity = Math.random() * 0.4 + 0.1;
            }
            update() {
                this.y += this.speed;
                if (this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                if (weatherType === 'snow') ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                else ctx.fillRect(this.x, this.y, 1, 15);
                ctx.fill();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (weatherType !== 'clear') {
                if (particles.length < 100) particles.push(new Particle());
                particles.forEach(p => { p.update(); p.draw(); });
            }
            requestAnimationFrame(animate);
        }
        animate();

        function spawnEnergyEffect() {
            const bolt = document.createElement('div');
            bolt.className = 'energy-bolt';
            bolt.innerHTML = '<i data-lucide="zap" class="w-12 h-12 text-blue-400"></i>';
            document.body.appendChild(bolt);
            lucide.createIcons();
            
            bolt.animate([
                { transform: 'translate(-50%, -50%) scale(0)', opacity: 1 },
                { transform: 'translate(-50%, -50%) scale(4)', opacity: 0 }
            ], { duration: 800, easing: 'ease-out' }).onfinish = () => bolt.remove();
        }

        function toggleMute() {
            isMuted = !isMuted;
            Tone.Destination.mute = isMuted;
            document.getElementById('mute-icon').setAttribute('data-lucide', isMuted ? 'volume-x' : 'volume-2');
            lucide.createIcons();
        }

        // Event Listeners for Fake Door Test
        const mintBtn = document.getElementById('mint-btn');
        const presaleBtn = document.getElementById('presale-btn');
        const cancelBtn = document.getElementById('cancel-presale-btn');

        mintBtn.addEventListener('click', async () => {
            await saveSession();
            document.getElementById('mint-initial-view').classList.add('hidden');
            document.getElementById('mint-presale-view').classList.remove('hidden');
        });

        presaleBtn.addEventListener('click', async () => {
            // Already saved on mintBtn click, but we can update if needed.
            console.log('PAYMENT_INTENT: User clicked pre-sale button.');
            
            document.getElementById('mint-presale-view').classList.add('hidden');
            document.getElementById('mint-thanks-view').classList.remove('hidden');
        });

        cancelBtn.addEventListener('click', () => {
            document.getElementById('mint-presale-view').classList.add('hidden');
            document.getElementById('mint-initial-view').classList.remove('hidden');
        });

        // Initial Map Load
        fetch('/api/global_sentiment').then(r => r.json()).then(updateGlobalMap);
    </script>
</body>
</html>
