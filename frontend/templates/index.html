<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMO - 情绪燃料站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: radial-gradient(circle at top right, #1a1a2e, #16213e, #0f3460);
            color: #e94560;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glow-blue { box-shadow: 0 0 20px rgba(0, 119, 255, 0.3); }
        .glow-pink { box-shadow: 0 0 20px rgba(233, 69, 96, 0.3); }

        @keyframes pulse-energy {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.5; }
        }

        .energy-node {
            animation: pulse-energy 2s infinite ease-in-out;
        }

        .gradient-text {
            background: linear-gradient(to right, #e94560, #0f3460);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Hide scrollbar */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen text-slate-200 overflow-x-hidden">
    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 px-6 py-4 flex justify-between items-center glass border-b border-white/10">
        <div class="flex items-center gap-2">
            <i data-lucide="zap" class="text-pink-500 fill-pink-500 w-6 h-6"></i>
            <span class="text-xl font-bold tracking-tighter text-white">EMO.FUEL</span>
        </div>
        <div class="flex gap-8 text-sm font-medium">
            <button onclick="showSection('diary')" class="nav-link hover:text-pink-500 transition-colors flex items-center gap-2">
                <i data-lucide="pen-tool" class="w-4 h-4"></i> 日记
            </button>
            <button onclick="showSection('market')" class="nav-link hover:text-pink-500 transition-colors flex items-center gap-2">
                <i data-lucide="shopping-cart" class="w-4 h-4"></i> 市场
            </button>
            <button onclick="showSection('vault')" class="nav-link hover:text-pink-500 transition-colors flex items-center gap-2">
                <i data-lucide="database" class="w-4 h-4"></i> 个人库
            </button>
        </div>
        <div class="flex items-center gap-4">
            <div class="px-3 py-1 rounded-full bg-pink-500/10 border border-pink-500/20 text-xs text-pink-500 flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-pink-500 energy-node"></div>
                1.2k ENERGY
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-24 pb-12 px-6 max-w-6xl mx-auto">
        
        <!-- DIARY SECTION -->
        <section id="diary-section" class="section-content space-y-12">
            <div class="text-center space-y-4">
                <h1 class="text-5xl font-bold text-white tracking-tight">将情绪转化为<span class="text-pink-500">燃料</span></h1>
                <p class="text-slate-400 max-w-xl mx-auto">每一段文字都是一种频率。记录你的日常，生成独一无二的情绪音乐 Token。</p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- Editor -->
                <div class="glass rounded-3xl p-8 space-y-6">
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-bold tracking-widest text-slate-500 uppercase">当前心情记录</span>
                        <span id="char-count" class="text-xs text-slate-600">0 字</span>
                    </div>
                    <textarea id="diary-input" 
                        class="w-full h-64 bg-transparent border-none focus:ring-0 text-xl text-white placeholder-slate-700 resize-none"
                        placeholder="此刻，你的内心在流淌什么？"></textarea>
                    
                    <div class="flex gap-4">
                        <button id="analyze-btn" class="flex-1 py-4 bg-pink-600 hover:bg-pink-500 text-white rounded-2xl font-bold transition-all active:scale-95 flex items-center justify-center gap-2">
                            <i data-lucide="sparkles" class="w-5 h-5"></i> 提炼情绪
                        </button>
                    </div>
                </div>

                <!-- Analysis & Preview -->
                <div id="analysis-panel" class="hidden glass rounded-3xl p-8 space-y-8 border-pink-500/20">
                    <div class="space-y-4">
                        <h3 class="text-xs font-bold tracking-widest text-slate-500 uppercase">情绪频谱分析</h3>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="p-4 rounded-2xl bg-white/5 border border-white/10">
                                <div class="text-xs text-slate-500 mb-1">极性 (Polarity)</div>
                                <div id="polarity-val" class="text-2xl font-bold text-white">-</div>
                            </div>
                            <div class="p-4 rounded-2xl bg-white/5 border border-white/10">
                                <div class="text-xs text-slate-500 mb-1">主观性 (Subj)</div>
                                <div id="subjectivity-val" class="text-2xl font-bold text-white">-</div>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <div class="flex justify-between items-center">
                            <h3 class="text-xs font-bold tracking-widest text-slate-500 uppercase">音乐指纹预览</h3>
                            <div id="bpm-display" class="text-xs text-pink-500 font-mono">-- BPM</div>
                        </div>
                        <div class="flex items-center gap-6">
                            <button id="play-preview" class="w-16 h-16 rounded-full bg-white text-slate-900 flex items-center justify-center hover:scale-110 transition-transform active:scale-95">
                                <i data-lucide="play" class="w-6 h-6 fill-current"></i>
                            </button>
                            <div id="wave-container" class="flex-1 h-12 flex items-center gap-1">
                                <!-- Bars added via JS -->
                            </div>
                        </div>
                    </div>

                    <div class="pt-4 border-t border-white/10 space-y-4">
                        <div class="flex justify-between items-end">
                            <div>
                                <div class="text-xs text-slate-500">预估价值</div>
                                <div id="estimated-price" class="text-xl font-bold text-white">0.00 EMO</div>
                            </div>
                            <button id="mint-btn" class="px-8 py-3 bg-white text-slate-900 rounded-xl font-bold hover:bg-slate-200 transition-colors">
                                铸造 Token
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- MARKET SECTION -->
        <section id="market-section" class="section-content hidden space-y-8">
            <div class="flex justify-between items-end">
                <div>
                    <h2 class="text-3xl font-bold text-white">情绪交易市场</h2>
                    <p class="text-slate-400">发现他人的情绪共鸣，收藏独特的频率。</p>
                </div>
                <div class="flex gap-2">
                    <button class="px-4 py-2 glass rounded-lg text-xs">最新</button>
                    <button class="px-4 py-2 glass rounded-lg text-xs">最高价</button>
                </div>
            </div>
            
            <div id="market-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Cards added via JS -->
            </div>
        </section>

        <!-- VAULT SECTION -->
        <section id="vault-section" class="section-content hidden space-y-8">
            <h2 class="text-3xl font-bold text-white">个人情绪金库</h2>
            <div id="vault-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Cards added via JS -->
            </div>
        </section>

    </main>

    <!-- UI Overlay for Notifications -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 glass rounded-full text-sm border-pink-500/50 hidden z-[100]">
        通知内容
    </div>

    <script>
        // Initialize Lucide
        lucide.createIcons();

        // State Management
        let currentSection = 'diary';
        let currentParams = null;
        let isPlaying = false;
        let synth, reverb;

        // API Helper
        const API_BASE = '/api';

        async function setupAudio() {
            if (synth) return;
            await Tone.start();
            
            // Ambient Reverb
            reverb = new Tone.Reverb({
                decay: 4,
                preDelay: 0.1,
                wet: 0.5
            }).toDestination();
            
            // Soothing Synth (Soft Keys)
            synth = new Tone.PolySynth(Tone.Synth, {
                oscillator: { type: 'sine' },
                envelope: {
                    attack: 0.5,
                    decay: 0.5,
                    sustain: 0.8,
                    release: 2
                }
            }).connect(reverb);
        }

        // Section Navigation
        function showSection(name) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.add('hidden'));
            document.getElementById(`${name}-section`).classList.remove('hidden');
            
            // Update nav styles
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('text-pink-500'));
            
            if (name === 'market') fetchMarket();
            if (name === 'vault') fetchVault();
        }

        // Diary Logic
        const diaryInput = document.getElementById('diary-input');
        const analyzeBtn = document.getElementById('analyze-btn');
        const analysisPanel = document.getElementById('analysis-panel');

        diaryInput.addEventListener('input', (e) => {
            document.getElementById('char-count').innerText = `${e.target.value.length} 字`;
        });

        analyzeBtn.addEventListener('click', async () => {
            const text = diaryInput.value;
            if (!text) return showToast('请输入点什么...');

            analyzeBtn.disabled = true;
            analyzeBtn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> 分析中...';
            lucide.createIcons();

            try {
                const res = await fetch(`${API_BASE}/analyze`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({text})
                });
                const data = await res.json();
                
                currentParams = data.music_params;
                updateAnalysisUI(data);
                analysisPanel.classList.remove('hidden');
            } catch (e) {
                showToast('后端连接失败');
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.innerHTML = '<i data-lucide="sparkles" class="w-5 h-5"></i> 提炼情绪';
                lucide.createIcons();
            }
        });

        function updateAnalysisUI(data) {
            document.getElementById('polarity-val').innerText = data.polarity.toFixed(2);
            document.getElementById('subjectivity-val').innerText = data.subjectivity.toFixed(2);
            document.getElementById('bpm-display').innerText = `${Math.round(data.music_params.tempo)} BPM`;
            document.getElementById('estimated-price').innerText = `${(0.01 + Math.abs(data.polarity)*0.1).toFixed(3)} EMO`;
            
            // Create wave bars
            const container = document.getElementById('wave-container');
            container.innerHTML = '';
            for(let i=0; i<30; i++) {
                const bar = document.createElement('div');
                bar.className = 'w-1 bg-white/20 rounded-full transition-all duration-300';
                bar.style.height = '20%';
                container.appendChild(bar);
            }
        }

        // Audio Preview
        document.getElementById('play-preview').addEventListener('click', async () => {
            if (!currentParams) return;
            await setupAudio();

            if (isPlaying) {
                Tone.Transport.stop();
                Tone.Transport.cancel();
                isPlaying = false;
                document.getElementById('play-preview').innerHTML = '<i data-lucide="play" class="w-6 h-6 fill-current"></i>';
            } else {
                const scale = currentParams.scale === 'major' ? 
                    ['C4', 'E4', 'G4', 'B4', 'D5', 'F5'] : 
                    ['C4', 'Eb4', 'G4', 'Bb4', 'C5', 'Eb5'];
                
                Tone.Transport.bpm.value = currentParams.tempo;
                
                new Tone.Loop(time => {
                    const note = scale[Math.floor(Math.random() * scale.length)];
                    synth.triggerAttackRelease(note, '8n', time);
                    
                    // Animate bars
                    document.querySelectorAll('#wave-container div').forEach(b => {
                        b.style.height = `${30 + Math.random()*70}%`;
                        b.style.backgroundColor = '#e94560';
                    });
                }, '4n').start(0);

                Tone.Transport.start();
                isPlaying = true;
                document.getElementById('play-preview').innerHTML = '<i data-lucide="pause" class="w-6 h-6 fill-current"></i>';
            }
            lucide.createIcons();
        });

        // Minting
        document.getElementById('mint-btn').addEventListener('click', async () => {
            const text = diaryInput.value;
            if (!text || !currentParams) return;

            const res = await fetch(`${API_BASE}/save`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text, music_params: currentParams})
            });
            const data = await res.json();
            
            if (data.status === 'success') {
                showToast('Token 铸造成功！已存入个人库');
                diaryInput.value = '';
                analysisPanel.classList.add('hidden');
            }
        });

        // Marketplace
        async function fetchMarket() {
            const res = await fetch(`${API_BASE}/tokens`);
            const tokens = await res.json();
            const grid = document.getElementById('market-grid');
            grid.innerHTML = tokens.map(t => `
                <div class="glass rounded-2xl p-6 space-y-4 hover:border-pink-500/50 transition-all group">
                    <div class="flex justify-between items-start">
                        <div class="w-10 h-10 rounded-lg bg-pink-500/20 flex items-center justify-center text-pink-500">
                            <i data-lucide="music"></i>
                        </div>
                        <div class="text-right">
                            <div class="text-[10px] text-slate-500 uppercase tracking-widest">Hash</div>
                            <div class="text-[10px] font-mono text-slate-400">#${t.token_hash.slice(0, 8)}</div>
                        </div>
                    </div>
                    <div>
                        <div class="text-sm text-slate-400 line-clamp-2 italic">"${t.music_params.scale} scale melody..."</div>
                    </div>
                    <div class="flex justify-between items-center pt-4 border-t border-white/5">
                        <div>
                            <div class="text-xs text-slate-500">价格</div>
                            <div class="font-bold text-white">${t.price} EMO</div>
                        </div>
                        <button onclick="buyToken(${t.id})" class="px-4 py-2 bg-white text-slate-900 rounded-lg text-xs font-bold hover:bg-pink-500 hover:text-white transition-all">
                            购买
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function buyToken(id) {
            const res = await fetch(`${API_BASE}/buy`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({token_id: id, buyer: 'You'})
            });
            const data = await res.json();
            if (data.status === 'purchased') {
                showToast('购买成功！');
                fetchMarket();
            }
        }

        // Store tokens globally for playback
        let storedTokens = {};

        async function fetchVault() {
            const res = await fetch(`${API_BASE}/vault`);
            const tokens = await res.json();
            const grid = document.getElementById('vault-grid');
            if (tokens.length === 0) {
                grid.innerHTML = '<div class="col-span-full py-20 text-center text-slate-500">金库目前是空的，快去记录一段日记吧！</div>';
                return;
            }
            
            grid.innerHTML = tokens.map(t => {
                storedTokens[t.id] = t.music_params;
                return `
                <div class="glass rounded-2xl p-6 space-y-4 hover:border-pink-500/50 transition-all">
                    <div class="flex justify-between items-start">
                        <div class="w-10 h-10 rounded-lg bg-pink-500/10 flex items-center justify-center text-pink-500">
                            <i data-lucide="shield-check"></i>
                        </div>
                        <div class="text-right">
                            <div class="text-[10px] text-slate-500 uppercase tracking-widest">${t.timestamp}</div>
                            <div class="text-[10px] font-mono text-slate-400">#${t.token_hash.slice(0, 8)}</div>
                        </div>
                    </div>
                    <div>
                        <div class="text-xs text-slate-500 mb-1">所属权: ${t.owner === 'Collector' ? '你' : t.owner}</div>
                        <div class="text-sm font-medium text-white">${t.music_params.scale.toUpperCase()} 情绪指纹</div>
                    </div>
                    <button onclick='playStoredMusic(${t.id})' class="w-full py-2 glass rounded-lg text-xs font-bold hover:bg-white hover:text-slate-900 transition-all flex items-center justify-center gap-2">
                        <i data-lucide="play" class="w-3 h-3"></i> 播放
                    </button>
                </div>
            `}).join('');
            lucide.createIcons();
        }

        async function playStoredMusic(id) {
            const params = storedTokens[id];
            if (!params) return;
            currentParams = params;
            await setupAudio();
            
            // Toggle logic
            if (isPlaying) {
                Tone.Transport.stop();
                Tone.Transport.cancel();
                isPlaying = false;
                showToast('已停止播放');
            } else {
                const scale = params.scale === 'major' ? 
                    ['C4', 'E4', 'G4', 'B4', 'D5', 'F5'] : 
                    ['C4', 'Eb4', 'G4', 'Bb4', 'C5', 'Eb5'];
                
                Tone.Transport.bpm.value = params.tempo;
                
                new Tone.Loop(time => {
                    const note = scale[Math.floor(Math.random() * scale.length)];
                    synth.triggerAttackRelease(note, '8n', time);
                }, '4n').start(0);

                Tone.Transport.start();
                isPlaying = true;
                showToast('正在播放已存音乐');
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
