<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMO.SOUL - 情绪疗愈空间</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;700&family=Space+Grotesk:wght@300;500&display=swap');
        
        body {
            font-family: 'Space Grotesk', 'Noto Serif SC', serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }

        .video-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: -2;
            opacity: 0.4;
            transition: opacity 2s ease;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent, rgba(0,0,0,0.8));
            z-index: -1;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-bubble {
            max-width: 80%;
            padding: 1rem 1.5rem;
            border-radius: 20px;
            margin-bottom: 1rem;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #weather-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .music-visualizer {
            display: flex;
            align-items: center;
            gap: 4px;
            height: 40px;
        }

        .vis-bar {
            width: 3px;
            background: #fff;
            border-radius: 10px;
            transition: height 0.1s ease;
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- Weather & Visuals -->
    <canvas id="weather-canvas"></canvas>
    <video id="bg-video" class="video-bg" autoplay muted loop playsinline></video>
    <div class="overlay"></div>

    <!-- Nav -->
    <nav class="fixed top-0 w-full p-6 flex justify-between items-center z-50">
        <div class="flex items-center gap-2 opacity-80">
            <i data-lucide="wind" class="w-5 h-5"></i>
            <span class="text-sm tracking-widest uppercase">EMO.SOUL</span>
        </div>
        <div class="flex items-center gap-6">
            <button onclick="toggleMute()" class="opacity-50 hover:opacity-100 transition-opacity">
                <i id="mute-icon" data-lucide="volume-2" class="w-5 h-5"></i>
            </button>
            <div id="status-tag" class="text-[10px] px-2 py-1 border border-white/20 rounded-full opacity-50 uppercase tracking-tighter">
                Ready
            </div>
        </div>
    </nav>

    <!-- Main Content: Chat Interface -->
    <main class="h-screen flex flex-col justify-end px-6 pb-24 max-w-4xl mx-auto relative z-20">
        
        <div id="chat-history" class="overflow-y-auto mb-8 pr-4 flex flex-col scroll-smooth">
            <!-- Messages appear here -->
            <div class="chat-bubble glass self-start text-white/80">
                欢迎来到你的情绪空间。告诉我，此刻你的内心世界正经历着怎样的波动？
            </div>
        </div>

        <div class="relative group">
            <textarea id="user-input" 
                class="w-full bg-white/5 border border-white/10 rounded-2xl p-6 pr-24 text-lg focus:ring-1 focus:ring-white/20 focus:outline-none placeholder-white/20 resize-none transition-all glass"
                placeholder="在此输入你的感悟..." rows="2"></textarea>
            
            <div class="absolute right-4 bottom-4 flex items-center gap-4">
                <div class="music-visualizer opacity-0 transition-opacity duration-1000" id="visualizer">
                    <!-- Bars added by JS -->
                </div>
                <button id="send-btn" class="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center hover:scale-105 transition-transform active:scale-95 shadow-xl">
                    <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </main>

    <!-- Dashboard for Tokens -->
    <div id="token-card" class="fixed top-24 right-6 w-64 glass rounded-3xl p-6 hidden translate-x-72 transition-transform duration-700 z-30">
        <div class="flex justify-between items-start mb-6">
            <span class="text-[10px] uppercase tracking-widest text-white/40">Emotion Token</span>
            <i data-lucide="shield-check" class="w-4 h-4 text-white/40"></i>
        </div>
        <div class="space-y-4">
            <div class="text-2xl font-bold tracking-tighter" id="token-price">0.02 EMO</div>
            <div class="text-[10px] font-mono text-white/30 truncate" id="token-hash">#00000000</div>
            <button id="mint-btn" class="w-full py-3 bg-white text-black rounded-xl text-xs font-bold hover:bg-white/90 transition-all">
                铸造为 NFT
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Constants
        const VIDEO_SOURCES = {
            bright: 'https://cdn.pixabay.com/video/2021/04/12/70875-536411514_large.mp4',
            peaceful: 'https://cdn.pixabay.com/video/2023/10/24/186355-877964121_large.mp4',
            melancholic: 'https://cdn.pixabay.com/video/2022/10/25/136450-764357731_large.mp4',
            default: 'https://cdn.pixabay.com/video/2023/10/24/186355-877964121_large.mp4'
        };

        // State
        let isMuted = false;
        let synth, pad, reverb;
        let isPlaying = false;
        let weatherType = 'clear';
        let currentParams = null;

        // Audio Setup
        async function setupAudio() {
            if (synth) return;
            await Tone.start();
            
            reverb = new Tone.Reverb({ decay: 5, wet: 0.6 }).toDestination();
            
            // Pad Synth for Chords
            pad = new Tone.PolySynth(Tone.Synth, {
                oscillator: { type: 'sine' },
                envelope: { attack: 2, decay: 1, sustain: 0.8, release: 4 }
            }).connect(reverb);
            pad.volume.value = -25;

            // Lead Synth for Melody
            synth = new Tone.MonoSynth({
                oscillator: { type: 'triangle' },
                envelope: { attack: 0.5, decay: 0.2, sustain: 0.5, release: 1.5 }
            }).connect(reverb);
            synth.volume.value = -15;
        }

        // Chat Interaction
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const history = document.getElementById('chat-history');

        sendBtn.addEventListener('click', async () => {
            const text = input.value.trim();
            if (!text) return;

            // Add user message
            addMessage(text, 'self-end glass text-white');
            input.value = '';

            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({text})
                });
                const data = await res.json();
                
                currentParams = data.music_params;
                handleAIResponse(data);
            } catch (e) {
                console.error(e);
            }
        });

        function addMessage(text, classes) {
            const msg = document.createElement('div');
            msg.className = `chat-bubble ${classes}`;
            msg.innerText = text;
            history.appendChild(msg);
            history.scrollTop = history.scrollHeight;
        }

        async function handleAIResponse(data) {
            // AI Text
            setTimeout(() => {
                addMessage(data.ai_response, 'self-start glass text-white/80 border-l-2 border-white/40');
            }, 1000);

            // UI Changes
            document.getElementById('bg-video').src = VIDEO_SOURCES[data.music_params.mode] || VIDEO_SOURCES.default;
            weatherType = data.music_params.weather;
            
            // Token UI
            const card = document.getElementById('token-card');
            card.classList.remove('hidden');
            setTimeout(() => card.style.transform = 'translateX(0)', 100);
            document.getElementById('token-price').innerText = `${(0.01 + Math.abs(data.polarity)*0.1).toFixed(3)} EMO`;
            document.getElementById('token-hash').innerText = `#${Math.random().toString(16).slice(2, 10)}`;

            // Start/Update Music
            await setupAudio();
            playMusic(data.music_params);
        }

        function playMusic(params) {
            Tone.Transport.stop();
            Tone.Transport.cancel();
            
            Tone.Transport.bpm.value = params.tempo;
            
            let chordIdx = 0;
            const loop = new Tone.Loop(time => {
                const chord = params.chords[chordIdx % params.chords.length];
                pad.triggerAttackRelease(chord, '1n', time);
                
                // Random melody based on chord notes
                const note = chord[Math.floor(Math.random() * chord.length)];
                synth.triggerAttackRelease(note, '4n', time + Tone.Time('4n').toSeconds());
                
                chordIdx++;
                animateVisualizer();
            }, '1n').start(0);

            Tone.Transport.start();
            document.getElementById('visualizer').classList.remove('opacity-0');
        }

        // Weather System
        const canvas = document.getElementById('weather-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = -20;
                this.size = weatherType === 'snow' ? Math.random() * 3 + 1 : Math.random() * 1 + 1;
                this.speed = weatherType === 'snow' ? Math.random() * 1 + 0.5 : Math.random() * 5 + 10;
                this.opacity = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.y += this.speed;
                if (weatherType === 'snow') this.x += Math.sin(this.y / 50) * 1;
                if (this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                if (weatherType === 'snow') {
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                } else {
                    ctx.fillRect(this.x, this.y, 1, 15);
                }
                ctx.fill();
            }
        }

        function initWeather() {
            particles = Array.from({length: 100}, () => new Particle());
            animate();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (weatherType !== 'clear') {
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
            }
            requestAnimationFrame(animate);
        }
        initWeather();

        // Visualizer
        const vis = document.getElementById('visualizer');
        for(let i=0; i<8; i++) {
            const b = document.createElement('div');
            b.className = 'vis-bar';
            b.style.height = '10px';
            vis.appendChild(b);
        }

        function animateVisualizer() {
            const bars = document.querySelectorAll('.vis-bar');
            bars.forEach(b => {
                b.style.height = `${Math.random() * 30 + 10}px`;
            });
        }

        function toggleMute() {
            isMuted = !isMuted;
            Tone.Destination.mute = isMuted;
            document.getElementById('mute-icon').setAttribute('data-lucide', isMuted ? 'volume-x' : 'volume-2');
            lucide.createIcons();
        }
    </script>
</body>
</html>
